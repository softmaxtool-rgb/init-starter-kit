server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip ลดขนาด chunk ใหญ่ (vendor/vue-core/icons) ตอนส่งให้ browser
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # SPA fallback — Vue Router history mode (refresh ที่ route ใดๆ ต้องคืน index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # static assets cache ยาว (ไฟล์ hash อยู่แล้ว เปลี่ยนชื่อเมื่อ build ใหม่)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # site-config.js ห้าม cache (เปลี่ยนค่า config โดยไม่ rebuild ได้)
    location = /site-config.js {
        expires -1;
        add_header Cache-Control "no-store";
    }
}
